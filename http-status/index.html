<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HTTP Status Codes — utils</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/utils/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/utils/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/utils/favicon-16x16.png">
  <link rel="manifest" href="/utils/site.webmanifest">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0e0e10; --surface: #18181c; --border: #2a2a32; --accent: #b4ff6e; --accent-dim: #7ab844; --text: #e8e8ee; --muted: #6b6b7a; --c1xx:#79c0ff; --c2xx:#6effb4; --c3xx:#ffa657; --c4xx:#ff6b6b; --c5xx:#c678dd; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
    .back { align-self: flex-start; margin-bottom: 1.5rem; font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 0.4rem; transition: color 0.15s; }
    .back:hover { color: var(--accent); }
    .card { width: 100%; max-width: 760px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; box-shadow: 0 0 60px rgba(180,255,110,0.04); }
    .eyebrow { font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
    h1 { font-size: 1.6rem; font-weight: 500; margin-bottom: 1.5rem; } h1 span { color: var(--muted); }
    .search-wrap { position: relative; margin-bottom: 1.5rem; }
    .search-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.9rem; padding: 0.75rem 1rem 0.75rem 2.5rem; outline: none; transition: border-color 0.2s; }
    .search-input:focus { border-color: var(--accent-dim); }
    .search-input::placeholder { color: var(--muted); }
    .search-icon { position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    .filter-tabs { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .ftab { font-family: 'Space Mono', monospace; font-size: 0.65rem; padding: 0.35rem 0.75rem; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; }
    .ftab.active { color: #0e0e10; }
    .ftab[data-f="all"].active { background: var(--accent); border-color: var(--accent); }
    .ftab[data-f="1"].active { background: var(--c1xx); border-color: var(--c1xx); }
    .ftab[data-f="2"].active { background: var(--c2xx); border-color: var(--c2xx); }
    .ftab[data-f="3"].active { background: var(--c3xx); border-color: var(--c3xx); }
    .ftab[data-f="4"].active { background: var(--c4xx); border-color: var(--c4xx); }
    .ftab[data-f="5"].active { background: var(--c5xx); border-color: var(--c5xx); }
    .status-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .status-item { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 0.9rem 1.1rem; display: flex; gap: 1rem; align-items: flex-start; cursor: pointer; transition: border-color 0.15s; }
    .status-item:hover { border-color: var(--accent-dim); }
    .status-item.hidden { display: none; }
    .code { font-family: 'Space Mono', monospace; font-size: 1rem; font-weight: 700; min-width: 48px; }
    .c1 { color: var(--c1xx); } .c2 { color: var(--c2xx); } .c3 { color: var(--c3xx); } .c4 { color: var(--c4xx); } .c5 { color: var(--c5xx); }
    .info { flex: 1; }
    .name { font-weight: 500; font-size: 0.92rem; margin-bottom: 0.2rem; }
    .desc { font-size: 0.8rem; color: var(--muted); line-height: 1.5; }
    .no-results { text-align: center; padding: 2rem; font-family: 'Space Mono', monospace; font-size: 0.8rem; color: var(--muted); display: none; }
  
    /* Maximise */
    .maximise-btn {
      position: absolute;
      top: 1.25rem;
      right: 1.25rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 7px;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.15s;
      flex-shrink: 0;
      z-index: 10;
    }
    .maximise-btn:hover { color: var(--accent); border-color: var(--accent-dim); }

    .card { position: relative; }

    .card.maximised {
      position: fixed;
      inset: 0;
      max-width: 100%;
      width: 100%;
      height: 100%;
      border-radius: 0;
      border: none;
      overflow-y: auto;
      z-index: 1000;
      margin: 0;
      padding: 2rem 2.5rem;
    }

    body.maximised-body {
      overflow: hidden;
    }
  </style>
</head>
<body>
  <a class="back" href="../">← utils</a>
  <div class="card">
      <button class="maximise-btn" onclick="toggleMaximise()" id="maxBtn" title="Maximise">⛶</button>
    <header><p class="eyebrow">Utility</p><h1>HTTP Status Codes <span>/ quick reference</span></h1></header>
    <div class="search-wrap">
      <span class="search-icon">🔎</span>
      <input class="search-input" type="text" id="search" placeholder="Search by code or name…" oninput="filter()">
    </div>
    <div class="filter-tabs">
      <button class="ftab active" data-f="all" onclick="setFilter(this)">All</button>
      <button class="ftab" data-f="1" onclick="setFilter(this)">1xx Info</button>
      <button class="ftab" data-f="2" onclick="setFilter(this)">2xx Success</button>
      <button class="ftab" data-f="3" onclick="setFilter(this)">3xx Redirect</button>
      <button class="ftab" data-f="4" onclick="setFilter(this)">4xx Client</button>
      <button class="ftab" data-f="5" onclick="setFilter(this)">5xx Server</button>
    </div>
    <div class="status-list" id="list"></div>
    <div class="no-results" id="noResults">No matching status codes</div>
  </div>
  <script>
    const CODES = [
      [100,'Continue','The server has received the request headers and the client should proceed to send the request body.'],
      [101,'Switching Protocols','The requester has asked the server to switch protocols and the server has agreed to do so.'],
      [102,'Processing','The server has received and is processing the request, but no response is available yet.'],
      [103,'Early Hints','Used to return some response headers before final HTTP message.'],
      [200,'OK','The request has succeeded.'],
      [201,'Created','The request has succeeded and a new resource has been created.'],
      [202,'Accepted','The request has been accepted for processing, but processing has not been completed.'],
      [203,'Non-Authoritative Information','The returned metadata is not exactly the same as is available from the origin server.'],
      [204,'No Content','There is no content to send for this request, but the headers may be useful.'],
      [205,'Reset Content','The server tells the client to reset the document which sent this request.'],
      [206,'Partial Content','The server is delivering only part of the resource due to a range header sent by the client.'],
      [207,'Multi-Status','Conveys information about multiple resources, for situations where multiple status codes might be appropriate.'],
      [301,'Moved Permanently','The URL of the requested resource has been changed permanently.'],
      [302,'Found','The resource is temporarily at a different URI.'],
      [303,'See Other','The response to the request can be found under another URI.'],
      [304,'Not Modified','The response has not been modified, so the client can use its cached version.'],
      [307,'Temporary Redirect','The request should be repeated with another URI but future requests should use the original URI.'],
      [308,'Permanent Redirect','The resource is now at another URI and all future requests should use the new URI.'],
      [400,'Bad Request','The server cannot process the request due to a client error such as malformed syntax.'],
      [401,'Unauthorized','Authentication is required and has failed or has not been provided.'],
      [403,'Forbidden','The server understood the request but refuses to authorize it.'],
      [404,'Not Found','The server cannot find the requested resource.'],
      [405,'Method Not Allowed','The request method is known but has been disabled and cannot be used.'],
      [406,'Not Acceptable','The server cannot produce a response matching the acceptable values in the request.'],
      [408,'Request Timeout','The server timed out waiting for the request.'],
      [409,'Conflict','The request conflicts with the current state of the server.'],
      [410,'Gone','The resource requested is no longer available and will not be available again.'],
      [411,'Length Required','The server rejected the request because the Content-Length header is not defined.'],
      [413,'Payload Too Large','The request is larger than the server is willing or able to process.'],
      [414,'URI Too Long','The URI provided was too long for the server to process.'],
      [415,'Unsupported Media Type','The media format of the requested data is not supported by the server.'],
      [418,'I\'m a Teapot','The server refuses to brew coffee because it is, permanently, a teapot.'],
      [422,'Unprocessable Entity','The server understands the content type but cannot process the contained instructions.'],
      [423,'Locked','The resource that is being accessed is locked.'],
      [429,'Too Many Requests','The user has sent too many requests in a given amount of time (rate limiting).'],
      [451,'Unavailable For Legal Reasons','The server is denying access to the resource due to legal demands.'],
      [500,'Internal Server Error','The server has encountered a situation it doesn\'t know how to handle.'],
      [501,'Not Implemented','The request method is not supported by the server and cannot be handled.'],
      [502,'Bad Gateway','The server, while working as a gateway, got an invalid response.'],
      [503,'Service Unavailable','The server is not ready to handle the request, often due to maintenance or overload.'],
      [504,'Gateway Timeout','The server is acting as a gateway and cannot get a response in time.'],
      [505,'HTTP Version Not Supported','The HTTP version used in the request is not supported by the server.'],
    ];
    let activeFilter = 'all';
    function setFilter(btn) {
      document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.f;
      filter();
    }
    function filter() {
      const q = document.getElementById('search').value.toLowerCase();
      let shown = 0;
      document.querySelectorAll('.status-item').forEach(el => {
        const code = el.dataset.code;
        const matchFilter = activeFilter === 'all' || code[0] === activeFilter;
        const matchSearch = !q || code.includes(q) || el.dataset.name.toLowerCase().includes(q) || el.dataset.desc.toLowerCase().includes(q);
        const show = matchFilter && matchSearch;
        el.classList.toggle('hidden', !show);
        if (show) shown++;
      });
      document.getElementById('noResults').style.display = shown === 0 ? 'block' : 'none';
    }
    function render() {
      const list = document.getElementById('list');
      list.innerHTML = CODES.map(([code, name, desc]) => {
        const cls = 'c' + String(code)[0];
        return `<div class="status-item" data-code="${code}" data-name="${name}" data-desc="${desc}">
          <span class="code ${cls}">${code}</span>
          <div class="info"><div class="name">${name}</div><div class="desc">${desc}</div></div>
        </div>`;
      }).join('');
    }
    render();
  
  function toggleMaximise() {
    const card = document.querySelector('.card');
    const btn = document.getElementById('maxBtn');
    const isMax = card.classList.toggle('maximised');
    document.body.classList.toggle('maximised-body', isMax);
    btn.textContent = isMax ? '✕' : '⛶';
    btn.title = isMax ? 'Restore' : 'Maximise';
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      const card = document.querySelector('.card');
      if (card.classList.contains('maximised')) toggleMaximise();
    }
  });
</script>
</body>
</html>
