<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Markdown Previewer — utils</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0e0e10; --surface: #18181c; --border: #2a2a32; --accent: #b4ff6e; --accent-dim: #7ab844; --text: #e8e8ee; --muted: #6b6b7a; --good: #6effb4; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
    .back { align-self: flex-start; margin-bottom: 1.5rem; font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 0.4rem; transition: color 0.15s; }
    .back:hover { color: var(--accent); }
    .card { width: 100%; max-width: 1100px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; box-shadow: 0 0 60px rgba(180,255,110,0.04); }
    .eyebrow { font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
    h1 { font-size: 1.6rem; font-weight: 500; margin-bottom: 2rem; } h1 span { color: var(--muted); }
    .panes { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
    .pane-label { font-family: 'Space Mono', monospace; font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
    textarea { width: 100%; height: 60vh; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.82rem; padding: 1.25rem; resize: none; outline: none; transition: border-color 0.2s; line-height: 1.7; }
    textarea:focus { border-color: var(--accent-dim); }
    .preview { height: 60vh; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem; overflow-y: auto; line-height: 1.75; font-size: 0.95rem; color: var(--text); }
    .preview h1,.preview h2,.preview h3,.preview h4 { color: var(--accent); margin: 1.2em 0 0.5em; line-height: 1.3; }
    .preview h1 { font-size: 1.5em; } .preview h2 { font-size: 1.25em; } .preview h3 { font-size: 1.1em; }
    .preview p { margin-bottom: 0.85em; }
    .preview code { font-family: 'Space Mono', monospace; font-size: 0.82em; background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 0.1em 0.4em; color: var(--accent); }
    .preview pre { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1em; overflow-x: auto; margin-bottom: 1em; }
    .preview pre code { background: none; border: none; padding: 0; font-size: 0.82em; color: var(--text); }
    .preview blockquote { border-left: 3px solid var(--accent-dim); padding-left: 1em; color: var(--muted); margin-bottom: 0.85em; }
    .preview ul,.preview ol { padding-left: 1.5em; margin-bottom: 0.85em; }
    .preview li { margin-bottom: 0.25em; }
    .preview a { color: var(--accent); }
    .preview hr { border: none; border-top: 1px solid var(--border); margin: 1.25em 0; }
    .preview table { border-collapse: collapse; width: 100%; margin-bottom: 1em; }
    .preview th,.preview td { border: 1px solid var(--border); padding: 0.5em 0.75em; font-size: 0.88em; }
    .preview th { background: var(--surface); color: var(--accent); }
    .preview strong { color: var(--text); font-weight: 600; }
    @media (max-width: 700px) { .panes { grid-template-columns: 1fr; } textarea,.preview { height: 40vh; } }
  </style>
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png">
  <link rel="manifest" href="../site.webmanifest">
</head>
<body>
  <a class="back" href="../">← utils</a>
  <div class="card">
    <header><p class="eyebrow">Utility</p><h1>Markdown Previewer <span>/ live render</span></h1></header>
    <div class="panes">
      <div><p class="pane-label">Markdown</p><textarea id="input" placeholder="# Hello&#10;&#10;Type some **markdown** here…" oninput="render()"></textarea></div>
      <div><p class="pane-label">Preview</p><div class="preview" id="preview"></div></div>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script>
    marked.setOptions({ breaks: true, gfm: true });
    function render() { document.getElementById('preview').innerHTML = marked.parse(document.getElementById('input').value); }
    document.getElementById('input').value = `# Welcome to Markdown Previewer\n\nType in the left pane and see a **live preview** on the right.\n\n## Features\n\n- Headings\n- **Bold** and *italic* text\n- \`inline code\`\n- [Links](https://example.com)\n- Tables, blockquotes, and more\n\n> Markdown is a lightweight markup language.\n\n\`\`\`js\nconst greet = name => \`Hello, \${name}!\`;\n\`\`\`\n`;
    render();
  </script>
</body>
</html>
