<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Counter — utils</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0e0e10; --surface: #18181c; --border: #2a2a32; --accent: #b4ff6e; --accent-dim: #7ab844; --text: #e8e8ee; --muted: #6b6b7a; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
    .back { align-self: flex-start; margin-bottom: 1.5rem; font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 0.4rem; transition: color 0.15s; }
    .back:hover { color: var(--accent); }
    .card { width: 100%; max-width: 680px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; box-shadow: 0 0 60px rgba(180,255,110,0.04); }
    .eyebrow { font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
    h1 { font-size: 1.6rem; font-weight: 500; margin-bottom: 2rem; } h1 span { color: var(--muted); }
    textarea { width: 100%; min-height: 220px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; padding: 1rem; resize: vertical; outline: none; transition: border-color 0.2s; line-height: 1.7; margin-bottom: 1.5rem; }
    textarea:focus { border-color: var(--accent-dim); } textarea::placeholder { color: var(--muted); }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 1rem; }
    .stat { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.25rem; }
    .stat-val { font-family: 'Space Mono', monospace; font-size: 1.5rem; color: var(--accent); font-weight: 700; line-height: 1; margin-bottom: 0.3rem; }
    .stat-label { font-family: 'Space Mono', monospace; font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .stats2 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
    .divider { height: 1px; background: var(--border); margin: 1.25rem 0; }
    .reading-row { display: flex; gap: 1.5rem; flex-wrap: wrap; }
    .reading-item { font-size: 0.88rem; color: var(--muted); }
    .reading-item span { color: var(--text); font-weight: 500; }
  </style>
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png">
  <link rel="manifest" href="../site.webmanifest">
</head>
<body>
  <a class="back" href="../">← utils</a>
  <div class="card">
    <header><p class="eyebrow">Utility</p><h1>Word Counter <span>/ characters &amp; reading time</span></h1></header>
    <textarea id="input" placeholder="Paste or type your text here…" oninput="count()"></textarea>
    <div class="stats">
      <div class="stat"><div class="stat-val" id="words">0</div><div class="stat-label">Words</div></div>
      <div class="stat"><div class="stat-val" id="chars">0</div><div class="stat-label">Characters</div></div>
      <div class="stat"><div class="stat-val" id="charsno">0</div><div class="stat-label">No spaces</div></div>
    </div>
    <div class="stats2">
      <div class="stat"><div class="stat-val" id="sentences">0</div><div class="stat-label">Sentences</div></div>
      <div class="stat"><div class="stat-val" id="paragraphs">0</div><div class="stat-label">Paragraphs</div></div>
      <div class="stat"><div class="stat-val" id="lines">0</div><div class="stat-label">Lines</div></div>
    </div>
    <div class="divider"></div>
    <div class="reading-row">
      <div class="reading-item">Reading time: <span id="readTime">—</span></div>
      <div class="reading-item">Speaking time: <span id="speakTime">—</span></div>
      <div class="reading-item">Avg word length: <span id="avgWord">—</span></div>
    </div>
  </div>
  <script>
    function count() {
      const t = document.getElementById('input').value;
      const words = t.trim() ? t.trim().split(/\s+/).filter(Boolean) : [];
      const sentences = t.split(/[.!?]+/).filter(s=>s.trim()).length;
      const paras = t.split(/\n\s*\n/).filter(p=>p.trim()).length;
      const lines = t.split('\n').length;
      document.getElementById('words').textContent = words.length;
      document.getElementById('chars').textContent = t.length;
      document.getElementById('charsno').textContent = t.replace(/\s/g,'').length;
      document.getElementById('sentences').textContent = sentences;
      document.getElementById('paragraphs').textContent = paras || (t.trim() ? 1 : 0);
      document.getElementById('lines').textContent = t ? lines : 0;
      const wpm = 238, spm = 150;
      if (words.length) {
        document.getElementById('readTime').textContent = fmt(words.length/wpm);
        document.getElementById('speakTime').textContent = fmt(words.length/spm);
        const avg = words.reduce((a,w)=>a+w.replace(/[^a-zA-Z]/g,'').length,0)/words.length;
        document.getElementById('avgWord').textContent = avg.toFixed(1) + ' chars';
      } else {
        document.getElementById('readTime').textContent = '—';
        document.getElementById('speakTime').textContent = '—';
        document.getElementById('avgWord').textContent = '—';
      }
    }
    function fmt(mins) {
      if (mins < 1) return Math.round(mins*60) + 's';
      if (mins < 60) return Math.round(mins) + ' min';
      return Math.floor(mins/60) + 'h ' + Math.round(mins%60) + 'm';
    }
  </script>
</body>
</html>
