<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hash Generator — utils</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0e0e10; --surface: #18181c; --border: #2a2a32; --accent: #b4ff6e; --accent-dim: #7ab844; --text: #e8e8ee; --muted: #6b6b7a; --good: #6effb4; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
    .back { align-self: flex-start; margin-bottom: 1.5rem; font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 0.4rem; transition: color 0.15s; }
    .back:hover { color: var(--accent); }
    .card { width: 100%; max-width: 680px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; box-shadow: 0 0 60px rgba(180,255,110,0.04); }
    .eyebrow { font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
    h1 { font-size: 1.6rem; font-weight: 500; margin-bottom: 2rem; } h1 span { color: var(--muted); }
    .label { font-family: 'Space Mono', monospace; font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
    textarea { width: 100%; min-height: 100px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; padding: 1rem; resize: vertical; outline: none; transition: border-color 0.2s; line-height: 1.6; margin-bottom: 1.5rem; }
    textarea:focus { border-color: var(--accent-dim); } textarea::placeholder { color: var(--muted); }
    .note { font-size: 0.8rem; color: var(--muted); margin-bottom: 1.5rem; }
    .divider { height: 1px; background: var(--border); margin: 0 0 1.5rem; }
    .hash-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .hash-row { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 0.9rem 1rem; }
    .hash-name { font-family: 'Space Mono', monospace; font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.35rem; }
    .hash-val { font-family: 'Space Mono', monospace; font-size: 0.75rem; color: var(--accent); word-break: break-all; line-height: 1.5; display: flex; justify-content: space-between; align-items: flex-start; gap: 0.75rem; }
    .copy-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 0.68rem; padding: 0.25rem 0.6rem; border-radius: 5px; cursor: pointer; font-family: 'Space Mono', monospace; transition: all 0.15s; flex-shrink: 0; }
    .copy-btn:hover { color: var(--text); border-color: var(--muted); }
    .copy-btn.copied { color: var(--good); border-color: var(--good); }
  </style>
</head>
<body>
  <a class="back" href="../">← utils</a>
  <div class="card">
    <header><p class="eyebrow">Utility</p><h1>Hash Generator <span>/ MD5 · SHA family</span></h1></header>
    <p class="label">Input</p>
    <textarea id="input" placeholder="Type or paste text to hash…" oninput="hashAll()"></textarea>
    <p class="note">All hashing happens in your browser using the Web Crypto API. Nothing is sent anywhere. Note: MD5 is provided for compatibility only — it is not cryptographically secure.</p>
    <div class="divider"></div>
    <div class="hash-list" id="hashList"></div>
  </div>
  <script>
    const ALGOS = ['SHA-1','SHA-256','SHA-384','SHA-512'];
    async function sha(algo, text) {
      const buf = await crypto.subtle.digest(algo, new TextEncoder().encode(text));
      return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    }
    // Simple MD5 implementation
    function md5(s){
      function safeAdd(x,y){const lsw=(x&0xffff)+(y&0xffff);return(((x>>16)+(y>>16)+(lsw>>16))<<16)|(lsw&0xffff);}
      function bitRotL(n,c){return(n<<c)|(n>>>(32-c));}
      function md5cmn(q,a,b,x,s,t){return safeAdd(bitRotL(safeAdd(safeAdd(a,q),safeAdd(x,t)),s),b);}
      function md5ff(a,b,c,d,x,s,t){return md5cmn((b&c)|(~b&d),a,b,x,s,t);}
      function md5gg(a,b,c,d,x,s,t){return md5cmn((b&d)|(c&~d),a,b,x,s,t);}
      function md5hh(a,b,c,d,x,s,t){return md5cmn(b^c^d,a,b,x,s,t);}
      function md5ii(a,b,c,d,x,s,t){return md5cmn(c^(b|~d),a,b,x,s,t);}
      const x=[];let i;const l=s.length;for(i=0;i<l*8;i+=8)x[i>>5]|=(s.charCodeAt(i/8)&0xff)<<(i%32);x[l*8>>5]|=0x80<<(l*8%32);x[(((l*8+64)>>>9)<<4)+14]=l*8;
      let a=1732584193,b=-271733879,c=-1732584194,d=271733878;
      for(i=0;i<x.length;i+=16){const oa=a,ob=b,oc=c,od=d;
        a=md5ff(a,b,c,d,x[i],7,-680876936);d=md5ff(d,a,b,c,x[i+1],12,-389564586);c=md5ff(c,d,a,b,x[i+2],17,606105819);b=md5ff(b,c,d,a,x[i+3],22,-1044525330);
        a=md5ff(a,b,c,d,x[i+4],7,-176418897);d=md5ff(d,a,b,c,x[i+5],12,1200080426);c=md5ff(c,d,a,b,x[i+6],17,-1473231341);b=md5ff(b,c,d,a,x[i+7],22,-45705983);
        a=md5ff(a,b,c,d,x[i+8],7,1770035416);d=md5ff(d,a,b,c,x[i+9],12,-1958414417);c=md5ff(c,d,a,b,x[i+10],17,-42063);b=md5ff(b,c,d,a,x[i+11],22,-1990404162);
        a=md5ff(a,b,c,d,x[i+12],7,1804603682);d=md5ff(d,a,b,c,x[i+13],12,-40341101);c=md5ff(c,d,a,b,x[i+14],17,-1502002290);b=md5ff(b,c,d,a,x[i+15],22,1236535329);
        a=md5gg(a,b,c,d,x[i+1],5,-165796510);d=md5gg(d,a,b,c,x[i+6],9,-1069501632);c=md5gg(c,d,a,b,x[i+11],14,643717713);b=md5gg(b,c,d,a,x[i],20,-373897302);
        a=md5gg(a,b,c,d,x[i+5],5,-701558691);d=md5gg(d,a,b,c,x[i+10],9,38016083);c=md5gg(c,d,a,b,x[i+15],14,-660478335);b=md5gg(b,c,d,a,x[i+4],20,-405537848);
        a=md5gg(a,b,c,d,x[i+9],5,568446438);d=md5gg(d,a,b,c,x[i+14],9,-1019803690);c=md5gg(c,d,a,b,x[i+3],14,-187363961);b=md5gg(b,c,d,a,x[i+8],20,1163531501);
        a=md5gg(a,b,c,d,x[i+13],5,-1444681467);d=md5gg(d,a,b,c,x[i+2],9,-51403784);c=md5gg(c,d,a,b,x[i+7],14,1735328473);b=md5gg(b,c,d,a,x[i+12],20,-1926607734);
        a=md5hh(a,b,c,d,x[i+5],4,-378558);d=md5hh(d,a,b,c,x[i+8],11,-2022574463);c=md5hh(c,d,a,b,x[i+11],16,1839030562);b=md5hh(b,c,d,a,x[i+14],23,-35309556);
        a=md5hh(a,b,c,d,x[i+1],4,-1530992060);d=md5hh(d,a,b,c,x[i+4],11,1272893353);c=md5hh(c,d,a,b,x[i+7],16,-155497632);b=md5hh(b,c,d,a,x[i+10],23,-1094730640);
        a=md5hh(a,b,c,d,x[i+13],4,681279174);d=md5hh(d,a,b,c,x[i],11,-358537222);c=md5hh(c,d,a,b,x[i+3],16,-722521979);b=md5hh(b,c,d,a,x[i+6],23,76029189);
        a=md5hh(a,b,c,d,x[i+9],4,-640364487);d=md5hh(d,a,b,c,x[i+12],11,-421815835);c=md5hh(c,d,a,b,x[i+15],16,530742520);b=md5hh(b,c,d,a,x[i+2],23,-995338651);
        a=md5ii(a,b,c,d,x[i],6,-198630844);d=md5ii(d,a,b,c,x[i+7],10,1126891415);c=md5ii(c,d,a,b,x[i+14],15,-1416354905);b=md5ii(b,c,d,a,x[i+5],21,-57434055);
        a=md5ii(a,b,c,d,x[i+12],6,1700485571);d=md5ii(d,a,b,c,x[i+3],10,-1894986606);c=md5ii(c,d,a,b,x[i+10],15,-1051523);b=md5ii(b,c,d,a,x[i+1],21,-2054922799);
        a=md5ii(a,b,c,d,x[i+8],6,1873313359);d=md5ii(d,a,b,c,x[i+15],10,-30611744);c=md5ii(c,d,a,b,x[i+6],15,-1560198380);b=md5ii(b,c,d,a,x[i+13],21,1309151649);
        a=md5ii(a,b,c,d,x[i+4],6,-145523070);d=md5ii(d,a,b,c,x[i+11],10,-1120210379);c=md5ii(c,d,a,b,x[i+2],15,718787259);b=md5ii(b,c,d,a,x[i+9],21,-343485551);
        a=safeAdd(a,oa);b=safeAdd(b,ob);c=safeAdd(c,oc);d=safeAdd(d,od);}
      return [a,b,c,d].map(n=>{let h='';for(let j=0;j<4;j++)h+=('0'+(((n>>>(j*8))&0xff)).toString(16)).slice(-2);return h;}).join('');
    }
    function ucs2to8(s){const out=[];let i=0,len=s.length,c;while(i<len){c=s.charCodeAt(i++);if(c<128){out.push(String.fromCharCode(c));}else if(c<2048){out.push(String.fromCharCode(192|(c>>6)),String.fromCharCode(128|(c&63)));}else{out.push(String.fromCharCode(224|(c>>12)),String.fromCharCode(128|((c>>6)&63)),String.fromCharCode(128|(c&63)));}}return out.join('');}
    async function hashAll(){
      const text=document.getElementById('input').value;
      const list=document.getElementById('hashList');
      list.innerHTML='<div style="color:var(--muted);font-family:Space Mono,monospace;font-size:0.78rem">Computing…</div>';
      const results=[{name:'MD5',val:md5(ucs2to8(text))}];
      for(const a of ALGOS){try{results.push({name:a,val:await sha(a,text)});}catch(e){results.push({name:a,val:'Error: '+e.message});}}
      list.innerHTML=results.map((r,i)=>`
        <div class="hash-row">
          <p class="hash-name">${r.name}</p>
          <div class="hash-val"><span id="hv${i}">${r.val}</span><button class="copy-btn" onclick="cp(${i},this)">Copy</button></div>
        </div>`).join('');
    }
    function cp(i,btn){navigator.clipboard.writeText(document.getElementById('hv'+i).textContent).then(()=>{btn.textContent='Copied!';btn.classList.add('copied');setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied');},2000);});}
    hashAll();
  </script>
</body>
</html>
