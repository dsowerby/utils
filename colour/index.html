<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Colour Converter — utils</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e10; --surface: #18181c; --border: #2a2a32;
      --accent: #b4ff6e; --accent-dim: #7ab844; --text: #e8e8ee;
      --muted: #6b6b7a; --danger: #ff6b6b; --good: #6effb4;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
    .back { align-self: flex-start; margin-bottom: 1.5rem; font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 0.4rem; transition: color 0.15s; }
    .back:hover { color: var(--accent); }
    .card { width: 100%; max-width: 680px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; box-shadow: 0 0 60px rgba(180,255,110,0.04); }
    .eyebrow { font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
    h1 { font-size: 1.6rem; font-weight: 500; color: var(--text); line-height: 1.2; margin-bottom: 2rem; }
    h1 span { color: var(--muted); }
    .swatch-row { display: flex; gap: 1rem; align-items: center; margin-bottom: 1.5rem; }
    .swatch { width: 72px; height: 72px; border-radius: 12px; border: 1px solid var(--border); transition: background 0.2s; flex-shrink: 0; }
    .picker-wrap { display: flex; flex-direction: column; gap: 0.4rem; }
    .picker-label { font-family: 'Space Mono', monospace; font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    input[type="color"] { width: 48px; height: 36px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); cursor: pointer; padding: 2px; }
    .field-label { font-family: 'Space Mono', monospace; font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.35rem; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
    .field { display: flex; flex-direction: column; gap: 0.3rem; }
    .field input[type="text"] { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.8rem; padding: 0.6rem 0.85rem; outline: none; transition: border-color 0.2s; width: 100%; }
    .field input[type="text"]:focus { border-color: var(--accent-dim); }
    .divider { height: 1px; background: var(--border); margin: 1.25rem 0; }
    .hsl-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
    .slider-field { display: flex; flex-direction: column; gap: 0.4rem; }
    input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; border-radius: 2px; background: var(--border); outline: none; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; }
    .copy-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 0.78rem; padding: 0.35rem 0.8rem; border-radius: 6px; cursor: pointer; font-family: 'Space Mono', monospace; transition: all 0.15s; margin-top: 0.3rem; align-self: flex-start; }
    .copy-btn:hover { color: var(--text); border-color: var(--muted); }
    .copy-btn.copied { color: var(--good); border-color: var(--good); }
    .error { color: var(--danger); font-size: 0.78rem; font-family: 'Space Mono', monospace; min-height: 1.2em; margin-top: 0.25rem; }
  </style>
  <link rel="apple-touch-icon" sizes="180x180" href="/utils/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/utils/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/utils/favicon-16x16.png">
  <link rel="manifest" href="/utils/site.webmanifest">
</head>
<body>
  <a class="back" href="../">← utils</a>
  <div class="card">
    <header>
      <p class="eyebrow">Utility</p>
      <h1>Colour Converter <span>/ hex · rgb · hsl</span></h1>
    </header>

    <div class="swatch-row">
      <div class="swatch" id="swatch"></div>
      <div class="picker-wrap">
        <span class="picker-label">Pick a colour</span>
        <input type="color" id="picker" value="#b4ff6e" oninput="fromPicker()">
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <span class="field-label">Hex</span>
        <input type="text" id="hexInput" placeholder="#b4ff6e" oninput="fromHex()">
        <p class="error" id="hexError"></p>
        <button class="copy-btn" onclick="copyField('hexInput')">Copy</button>
      </div>
      <div class="field">
        <span class="field-label">RGB</span>
        <input type="text" id="rgbInput" placeholder="rgb(180, 255, 110)" oninput="fromRgb()">
        <p class="error" id="rgbError"></p>
        <button class="copy-btn" onclick="copyField('rgbInput')">Copy</button>
      </div>
    </div>

    <div class="divider"></div>

    <p class="field-label" style="margin-bottom:0.75rem">HSL</p>
    <div class="hsl-row">
      <div class="slider-field">
        <span class="field-label">H <span id="hVal">93</span>°</span>
        <input type="range" id="hSlider" min="0" max="360" value="93" oninput="fromHsl()">
      </div>
      <div class="slider-field">
        <span class="field-label">S <span id="sVal">100</span>%</span>
        <input type="range" id="sSlider" min="0" max="100" value="100" oninput="fromHsl()">
      </div>
      <div class="slider-field">
        <span class="field-label">L <span id="lVal">71</span>%</span>
        <input type="range" id="lSlider" min="0" max="100" value="71" oninput="fromHsl()">
      </div>
    </div>
    <div class="field" style="margin-top:0.75rem">
      <input type="text" id="hslInput" placeholder="hsl(93, 100%, 71%)" oninput="fromHslText()">
      <button class="copy-btn" onclick="copyField('hslInput')" style="margin-top:0.4rem">Copy</button>
    </div>
  </div>

  <script>
    function hexToRgb(hex) {
      hex = hex.replace(/^#/, '');
      if (hex.length === 3) hex = hex.split('').map(x=>x+x).join('');
      if (hex.length !== 6) return null;
      const n = parseInt(hex, 16);
      if (isNaN(n)) return null;
      return { r: (n>>16)&255, g: (n>>8)&255, b: n&255 };
    }
    function rgbToHsl(r,g,b) {
      r/=255; g/=255; b/=255;
      const max=Math.max(r,g,b), min=Math.min(r,g,b);
      let h,s,l=(max+min)/2;
      if (max===min) { h=s=0; } else {
        const d=max-min; s=l>0.5?d/(2-max-min):d/(max+min);
        switch(max){ case r:h=((g-b)/d+(g<b?6:0))/6;break; case g:h=((b-r)/d+2)/6;break; case b:h=((r-g)/d+4)/6;break; }
      }
      return { h:Math.round(h*360), s:Math.round(s*100), l:Math.round(l*100) };
    }
    function hslToRgb(h,s,l) {
      s/=100; l/=100;
      const a=s*Math.min(l,1-l);
      const f=n=>{ const k=(n+h/30)%12; return l-a*Math.max(Math.min(k-3,9-k,1),-1); };
      return { r:Math.round(f(0)*255), g:Math.round(f(8)*255), b:Math.round(f(4)*255) };
    }
    function rgbToHex(r,g,b) {
      return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
    }
    function updateAll(r,g,b) {
      const hex = rgbToHex(r,g,b);
      const hsl = rgbToHsl(r,g,b);
      document.getElementById('swatch').style.background = hex;
      document.getElementById('picker').value = hex;
      document.getElementById('hexInput').value = hex;
      document.getElementById('rgbInput').value = `rgb(${r}, ${g}, ${b})`;
      document.getElementById('hslInput').value = `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
      document.getElementById('hSlider').value = hsl.h;
      document.getElementById('sSlider').value = hsl.s;
      document.getElementById('lSlider').value = hsl.l;
      document.getElementById('hVal').textContent = hsl.h;
      document.getElementById('sVal').textContent = hsl.s;
      document.getElementById('lVal').textContent = hsl.l;
      document.getElementById('hexError').textContent = '';
      document.getElementById('rgbError').textContent = '';
    }
    function fromPicker() {
      const rgb = hexToRgb(document.getElementById('picker').value);
      if (rgb) updateAll(rgb.r, rgb.g, rgb.b);
    }
    function fromHex() {
      const val = document.getElementById('hexInput').value.trim();
      const rgb = hexToRgb(val);
      if (rgb) { updateAll(rgb.r,rgb.g,rgb.b); document.getElementById('hexError').textContent=''; }
      else document.getElementById('hexError').textContent = val.length>2 ? 'Invalid hex' : '';
    }
    function fromRgb() {
      const val = document.getElementById('rgbInput').value.trim();
      const m = val.match(/rgb\s*\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)/i);
      if (m) { updateAll(+m[1],+m[2],+m[3]); document.getElementById('rgbError').textContent=''; }
      else document.getElementById('rgbError').textContent = val.length>3 ? 'Use rgb(r, g, b)' : '';
    }
    function fromHsl() {
      const h=+document.getElementById('hSlider').value, s=+document.getElementById('sSlider').value, l=+document.getElementById('lSlider').value;
      document.getElementById('hVal').textContent=h; document.getElementById('sVal').textContent=s; document.getElementById('lVal').textContent=l;
      const rgb=hslToRgb(h,s,l); updateAll(rgb.r,rgb.g,rgb.b);
    }
    function fromHslText() {
      const val = document.getElementById('hslInput').value.trim();
      const m = val.match(/hsl\s*\(\s*(\d+)\s*,\s*(\d+)%?\s*,\s*(\d+)%?\s*\)/i);
      if (m) { const rgb=hslToRgb(+m[1],+m[2],+m[3]); updateAll(rgb.r,rgb.g,rgb.b); }
    }
    function copyField(id) {
      const val = document.getElementById(id).value;
      if (!val) return;
      navigator.clipboard.writeText(val).then(() => {
        const btns = document.querySelectorAll('.copy-btn');
        btns.forEach(b => { if (b.getAttribute('onclick')===`copyField('${id}')`) { b.textContent='Copied!'; b.classList.add('copied'); setTimeout(()=>{b.textContent='Copy';b.classList.remove('copied');},2000); } });
      });
    }
    // Init
    const init = hexToRgb('#b4ff6e');
    updateAll(init.r, init.g, init.b);
  </script>
</body>
</html>
