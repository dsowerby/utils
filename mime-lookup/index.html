<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MIME Type Lookup — utils</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/utils/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/utils/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/utils/favicon-16x16.png">
  <link rel="manifest" href="/utils/site.webmanifest">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0e0e10; --surface: #18181c; --border: #2a2a32; --accent: #b4ff6e; --accent-dim: #7ab844; --text: #e8e8ee; --muted: #6b6b7a; --good: #6effb4; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
    .back { align-self: flex-start; margin-bottom: 1.5rem; font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 0.4rem; transition: color 0.15s; }
    .back:hover { color: var(--accent); }
    .card { width: 100%; max-width: 680px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; box-shadow: 0 0 60px rgba(180,255,110,0.04); }
    .eyebrow { font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
    h1 { font-size: 1.6rem; font-weight: 500; margin-bottom: 1.5rem; } h1 span { color: var(--muted); }
    .search-wrap { position: relative; margin-bottom: 1.5rem; }
    .search-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.9rem; padding: 0.75rem 1rem 0.75rem 2.5rem; outline: none; transition: border-color 0.2s; }
    .search-input:focus { border-color: var(--accent-dim); } .search-input::placeholder { color: var(--muted); }
    .search-icon { position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    .result-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .result-item { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 0.9rem 1.1rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
    .ext { font-family: 'Space Mono', monospace; font-size: 0.85rem; color: var(--accent); min-width: 70px; }
    .mime { font-family: 'Space Mono', monospace; font-size: 0.78rem; color: var(--text); flex: 1; word-break: break-all; }
    .copy-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 0.68rem; padding: 0.3rem 0.6rem; border-radius: 5px; cursor: pointer; font-family: 'Space Mono', monospace; transition: all 0.15s; flex-shrink: 0; }
    .copy-btn:hover { color: var(--text); border-color: var(--muted); }
    .copy-btn.copied { color: var(--good); border-color: var(--good); }
    .no-results { text-align: center; padding: 2rem; font-family: 'Space Mono', monospace; font-size: 0.8rem; color: var(--muted); }
    .count { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); margin-bottom: 0.75rem; }
    .count span { color: var(--accent); }
  </style>
</head>
<body>
  <a class="back" href="../">← utils</a>
  <div class="card">
    <header><p class="eyebrow">Utility</p><h1>MIME Type Lookup <span>/ extension ↔ type</span></h1></header>
    <div class="search-wrap">
      <span class="search-icon">🔎</span>
      <input class="search-input" type="text" id="search" placeholder="Search extension or MIME type…" oninput="filter()">
    </div>
    <p class="count" id="count"></p>
    <div class="result-list" id="list"></div>
  </div>
  <script>
    const MIMES = [
      ['html','text/html'],['htm','text/html'],['css','text/css'],['js','text/javascript'],
      ['ts','text/typescript'],['jsx','text/jsx'],['tsx','text/tsx'],
      ['json','application/json'],['jsonld','application/ld+json'],
      ['xml','application/xml'],['svg','image/svg+xml'],['csv','text/csv'],
      ['txt','text/plain'],['md','text/markdown'],['rtf','application/rtf'],
      ['pdf','application/pdf'],['doc','application/msword'],
      ['docx','application/vnd.openxmlformats-officedocument.wordprocessingml.document'],
      ['xls','application/vnd.ms-excel'],
      ['xlsx','application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'],
      ['ppt','application/vnd.ms-powerpoint'],
      ['pptx','application/vnd.openxmlformats-officedocument.presentationml.presentation'],
      ['zip','application/zip'],['gz','application/gzip'],['tar','application/x-tar'],
      ['7z','application/x-7z-compressed'],['rar','application/vnd.rar'],
      ['png','image/png'],['jpg','image/jpeg'],['jpeg','image/jpeg'],['gif','image/gif'],
      ['webp','image/webp'],['bmp','image/bmp'],['ico','image/x-icon'],['tiff','image/tiff'],
      ['avif','image/avif'],['heic','image/heic'],
      ['mp3','audio/mpeg'],['wav','audio/wav'],['ogg','audio/ogg'],
      ['mp4','video/mp4'],['webm','video/webm'],['avi','video/x-msvideo'],['mov','video/quicktime'],
      ['mkv','video/x-matroska'],['flv','video/x-flv'],
      ['woff','font/woff'],['woff2','font/woff2'],['ttf','font/ttf'],['otf','font/otf'],
      ['eot','application/vnd.ms-fontobject'],
      ['sh','application/x-sh'],['py','text/x-python'],['rb','application/x-ruby'],
      ['php','application/x-httpd-php'],['java','text/x-java-source'],
      ['c','text/x-csrc'],['cpp','text/x-c++src'],['h','text/x-chdr'],
      ['sql','application/sql'],['yaml','application/yaml'],['yml','application/yaml'],
      ['toml','application/toml'],['ini','text/plain'],['env','text/plain'],
      ['wasm','application/wasm'],['bin','application/octet-stream'],
      ['exe','application/vnd.microsoft.portable-executable'],
      ['dmg','application/x-apple-diskimage'],['apk','application/vnd.android.package-archive'],
    ];
    function filter() {
      const q = document.getElementById('search').value.toLowerCase().replace(/^\./,'');
      const list = document.getElementById('list');
      const matches = q ? MIMES.filter(([ext,mime]) => ext.includes(q) || mime.toLowerCase().includes(q)) : MIMES;
      document.getElementById('count').innerHTML = `<span>${matches.length}</span> type${matches.length===1?'':'s'}`;
      if (matches.length === 0) { list.innerHTML = '<div class="no-results">No matching MIME types</div>'; return; }
      list.innerHTML = matches.map(([ext,mime]) => `
        <div class="result-item">
          <span class="ext">.${ext}</span>
          <span class="mime">${mime}</span>
          <button class="copy-btn" onclick="cp(this,'${mime}')">Copy</button>
        </div>`).join('');
    }
    function cp(btn, val) {
      navigator.clipboard.writeText(val).then(() => { btn.textContent='Copied!'; btn.classList.add('copied'); setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied');},2000); });
    }
    filter();
  </script>
</body>
</html>
