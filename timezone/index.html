<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Timezone Converter — utils</title>
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png">
  <link rel="manifest" href="../site.webmanifest">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0e0e10; --surface: #18181c; --border: #2a2a32; --accent: #b4ff6e; --accent-dim: #7ab844; --text: #e8e8ee; --muted: #6b6b7a; --danger: #ff6b6b; --good: #6effb4; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
    .back { align-self: flex-start; margin-bottom: 1.5rem; font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 0.4rem; transition: color 0.15s; }
    .back:hover { color: var(--accent); }
    .card { width: 100%; max-width: 680px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; box-shadow: 0 0 60px rgba(180,255,110,0.04); }
    .eyebrow { font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
    h1 { font-size: 1.6rem; font-weight: 500; margin-bottom: 2rem; } h1 span { color: var(--muted); }
    .label { font-family: 'Space Mono', monospace; font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
    .now-row { display: flex; align-items: center; justify-content: space-between; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 0.9rem 1.1rem; margin-bottom: 1.5rem; }
    .now-label { font-family: 'Space Mono', monospace; font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .now-time { font-family: 'Space Mono', monospace; font-size: 1.2rem; color: var(--accent); }
    .divider { height: 1px; background: var(--border); margin: 1.25rem 0; }
    .tz-list { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1rem; }
    .tz-row { display: flex; align-items: center; gap: 0.6rem; }
    select.tz-select { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; padding: 0.65rem 0.9rem; outline: none; transition: border-color 0.2s; cursor: pointer; }
    select.tz-select:focus { border-color: var(--accent-dim); }
    .tz-time { font-family: 'Space Mono', monospace; font-size: 0.9rem; color: var(--accent); min-width: 85px; text-align: right; }
    .tz-date { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); min-width: 75px; text-align: right; }
    .rm-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 5px; cursor: pointer; padding: 0.35rem 0.55rem; font-size: 0.75rem; transition: all 0.15s; flex-shrink: 0; }
    .rm-btn:hover { color: var(--danger); border-color: var(--danger); }
    button.add-btn { background: transparent; border: 1px dashed var(--border); color: var(--muted); font-size: 0.8rem; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
    button.add-btn:hover { color: var(--text); border-color: var(--muted); }
    .offset-badge { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--muted); padding: 0.15rem 0.4rem; border: 1px solid var(--border); border-radius: 4px; flex-shrink: 0; }
  </style>
</head>
<body>
  <a class="back" href="../">← utils</a>
  <div class="card">
    <header><p class="eyebrow">Utility</p><h1>Timezone Converter <span>/ now across the world</span></h1></header>
    <div class="now-row">
      <div><p class="now-label">Your local time</p><p class="now-time" id="localTime">—</p></div>
      <div style="text-align:right"><p class="now-label">Timezone</p><p style="font-family:'Space Mono',monospace;font-size:0.75rem;color:var(--muted)" id="localTz">—</p></div>
    </div>
    <div class="tz-list" id="tzList"></div>
    <button class="add-btn" onclick="addTz()">+ Add timezone</button>
    <div class="divider"></div>
    <p class="label" style="margin-bottom:0.75rem">Quick add</p>
    <div style="display:flex;flex-wrap:wrap;gap:0.4rem" id="quickAdd"></div>
  </div>
  <script>
    const COMMON = [
      'America/New_York','America/Chicago','America/Denver','America/Los_Angeles',
      'America/Toronto','America/Vancouver','America/Sao_Paulo','America/Mexico_City',
      'Europe/London','Europe/Paris','Europe/Berlin','Europe/Madrid','Europe/Rome',
      'Europe/Amsterdam','Europe/Stockholm','Europe/Moscow','Europe/Istanbul',
      'Asia/Dubai','Asia/Karachi','Asia/Kolkata','Asia/Dhaka','Asia/Bangkok',
      'Asia/Singapore','Asia/Shanghai','Asia/Tokyo','Asia/Seoul','Asia/Hong_Kong',
      'Australia/Sydney','Australia/Melbourne','Australia/Perth',
      'Pacific/Auckland','Pacific/Honolulu','Pacific/Fiji','UTC',
    ];
    let zones = ['Europe/London','America/New_York','Asia/Tokyo'];
    function fmt(date, tz) {
      return { time: date.toLocaleTimeString('en-GB',{timeZone:tz,hour:'2-digit',minute:'2-digit',second:'2-digit'}),
               date: date.toLocaleDateString('en-GB',{timeZone:tz,weekday:'short',day:'numeric',month:'short'}),
               offset: (() => { try { const s=date.toLocaleString('en',{timeZone:tz,timeZoneName:'shortOffset'}); return s.split(' ').pop()||''; } catch(e){return '';} })() };
    }
    function renderList() {
      const now = new Date();
      document.getElementById('tzList').innerHTML = zones.map((z,i) => {
        const f = fmt(now,z);
        return `<div class="tz-row">
          <select class="tz-select" onchange="zones[${i}]=this.value">${COMMON.map(c=>`<option value="${c}"${c===z?' selected':''}>${c.replace('_',' ')}</option>`).join('')}</select>
          <span class="offset-badge">${f.offset}</span>
          <span class="tz-time">${f.time}</span>
          <span class="tz-date">${f.date}</span>
          <button class="rm-btn" onclick="zones.splice(${i},1);renderList()">✕</button>
        </div>`;
      }).join('');
    }
    function addTz() { zones.push('UTC'); renderList(); }
    function tick() {
      const now = new Date();
      document.getElementById('localTime').textContent = now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
      document.getElementById('localTz').textContent = Intl.DateTimeFormat().resolvedOptions().timeZone;
      renderList();
    }
    // Quick add buttons
    const QUICK = [['🇬🇧 London','Europe/London'],['🇺🇸 New York','America/New_York'],['🇺🇸 LA','America/Los_Angeles'],['🇩🇪 Berlin','Europe/Berlin'],['🇮🇳 India','Asia/Kolkata'],['🇯🇵 Tokyo','Asia/Tokyo'],['🇦🇺 Sydney','Australia/Sydney'],['🌐 UTC','UTC']];
    document.getElementById('quickAdd').innerHTML = QUICK.map(([label,tz])=>`<button style="background:transparent;border:1px solid var(--border);color:var(--muted);font-size:0.75rem;padding:0.3rem 0.7rem;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s" onmouseover="this.style.color='var(--text)';this.style.borderColor='var(--muted)'" onmouseout="this.style.color='var(--muted)';this.style.borderColor='var(--border)'" onclick="if(!zones.includes('${tz}')){zones.push('${tz}');renderList();}">${label}</button>`).join('');
    tick(); setInterval(tick, 1000);
  </script>
</body>
</html>
