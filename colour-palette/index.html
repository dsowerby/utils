<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Colour Palette — utils</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/utils/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/utils/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/utils/favicon-16x16.png">
  <link rel="manifest" href="/utils/site.webmanifest">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0e0e10; --surface: #18181c; --border: #2a2a32; --accent: #b4ff6e; --accent-dim: #7ab844; --text: #e8e8ee; --muted: #6b6b7a; --good: #6effb4; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
    .back { align-self: flex-start; margin-bottom: 1.5rem; font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 0.4rem; transition: color 0.15s; }
    .back:hover { color: var(--accent); }
    .card { width: 100%; max-width: 760px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; box-shadow: 0 0 60px rgba(180,255,110,0.04); }
    .eyebrow { font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
    h1 { font-size: 1.6rem; font-weight: 500; margin-bottom: 2rem; } h1 span { color: var(--muted); }
    .picker-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .label { font-family: 'Space Mono', monospace; font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.35rem; }
    input[type="color"] { width: 52px; height: 44px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); padding: 2px; cursor: pointer; }
    input[type="text"].hex-in { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.9rem; padding: 0.65rem 0.9rem; outline: none; transition: border-color 0.2s; width: 120px; }
    input[type="text"].hex-in:focus { border-color: var(--accent-dim); }
    .harmony-tabs { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .htab { font-family: 'Space Mono', monospace; font-size: 0.65rem; padding: 0.35rem 0.85rem; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; }
    .htab.active { background: var(--accent); color: #0e0e10; border-color: var(--accent); }
    .divider { height: 1px; background: var(--border); margin: 0 0 1.5rem; }
    .palette { display: flex; gap: 0.6rem; flex-wrap: wrap; }
    .swatch-wrap { display: flex; flex-direction: column; gap: 0.4rem; flex: 1; min-width: 80px; }
    .swatch { height: 80px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.08); transition: transform 0.15s; cursor: pointer; }
    .swatch:hover { transform: scale(1.04); }
    .swatch-hex { font-family: 'Space Mono', monospace; font-size: 0.68rem; color: var(--muted); text-align: center; }
    .swatch-role { font-family: 'Space Mono', monospace; font-size: 0.58rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--border); text-align: center; }
    .shades { margin-top: 1.5rem; }
    .shade-strip { display: flex; border-radius: 10px; overflow: hidden; height: 48px; }
    .shade-block { flex: 1; cursor: pointer; transition: flex 0.2s; }
    .shade-block:hover { flex: 1.4; }
    .shade-labels { display: flex; margin-top: 0.4rem; }
    .shade-label { flex: 1; text-align: center; font-family: 'Space Mono', monospace; font-size: 0.58rem; color: var(--muted); }
  </style>
</head>
<body>
  <a class="back" href="../">← utils</a>
  <div class="card">
    <header><p class="eyebrow">Utility</p><h1>Colour Palette <span>/ harmony generator</span></h1></header>
    <div class="picker-row">
      <div><p class="label">Pick</p><input type="color" id="picker" value="#b4ff6e" oninput="syncFromPicker()"></div>
      <div><p class="label">Hex</p><input type="text" class="hex-in" id="hexIn" value="#b4ff6e" oninput="syncFromHex()"></div>
    </div>
    <div class="harmony-tabs">
      <button class="htab active" data-h="complementary" onclick="setH(this)">Complementary</button>
      <button class="htab" data-h="analogous" onclick="setH(this)">Analogous</button>
      <button class="htab" data-h="triadic" onclick="setH(this)">Triadic</button>
      <button class="htab" data-h="tetradic" onclick="setH(this)">Tetradic</button>
      <button class="htab" data-h="split" onclick="setH(this)">Split-comp</button>
      <button class="htab" data-h="monochromatic" onclick="setH(this)">Monochromatic</button>
    </div>
    <div class="divider"></div>
    <div class="palette" id="palette"></div>
    <div class="shades">
      <p class="label" style="margin-bottom:0.6rem">Tints &amp; shades</p>
      <div class="shade-strip" id="shadeStrip"></div>
      <div class="shade-labels" id="shadeLabels"></div>
    </div>
  </div>
  <script>
    let harmony = 'complementary';
    function setH(btn) { document.querySelectorAll('.htab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); harmony=btn.dataset.h; render(); }
    function hexToHsl(hex) {
      let r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
      const max=Math.max(r,g,b), min=Math.min(r,g,b); let h,s,l=(max+min)/2;
      if(max===min){h=s=0;}else{const d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break;}}
      return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
    }
    function hslToHex(h,s,l) {
      s/=100;l/=100;const a=s*Math.min(l,1-l);const f=n=>{const k=(n+h/30)%12;return l-a*Math.max(Math.min(k-3,9-k,1),-1);};
      return '#'+[f(0),f(8),f(4)].map(x=>Math.round(x*255).toString(16).padStart(2,'0')).join('');
    }
    function harmonies(h,s,l) {
      const m = { complementary:[[h,s,l],[( h+180)%360,s,l]],
        analogous:[[h,s,l],[(h+30)%360,s,l],[(h-30+360)%360,s,l]],
        triadic:[[h,s,l],[(h+120)%360,s,l],[(h+240)%360,s,l]],
        tetradic:[[h,s,l],[(h+90)%360,s,l],[(h+180)%360,s,l],[(h+270)%360,s,l]],
        split:[[h,s,l],[(h+150)%360,s,l],[(h+210)%360,s,l]],
        monochromatic:[[h,s,l],[h,s,Math.max(l-20,10)],[h,s,Math.min(l+20,90)],[h,Math.max(s-20,10),l],[h,Math.min(s+20,100),l]],
      };
      return m[harmony];
    }
    const ROLES = {
      complementary:['Base','Complement'],
      analogous:['Base','Analogous +30°','Analogous −30°'],
      triadic:['Base','Triadic +120°','Triadic +240°'],
      tetradic:['Base','+90°','+180°','+270°'],
      split:['Base','Split +150°','Split +210°'],
      monochromatic:['Base','Darker','Lighter','Less sat.','More sat.'],
    };
    function render() {
      const hex = document.getElementById('hexIn').value.trim();
      if (!/^#[0-9a-f]{6}$/i.test(hex)) return;
      const [h,s,l] = hexToHsl(hex);
      const cols = harmonies(h,s,l).map(([hh,ss,ll])=>hslToHex(hh,ss,ll));
      const roles = ROLES[harmony];
      document.getElementById('palette').innerHTML = cols.map((c,i)=>`
        <div class="swatch-wrap">
          <div class="swatch" style="background:${c}" onclick="navigator.clipboard.writeText('${c}')" title="Click to copy ${c}"></div>
          <div class="swatch-hex">${c.toUpperCase()}</div>
          <div class="swatch-role">${roles[i]||''}</div>
        </div>`).join('');
      // Shades
      const shades = [10,20,30,40,50,60,70,80,90].map(ll=>hslToHex(h,s,ll));
      document.getElementById('shadeStrip').innerHTML = shades.map(c=>`<div class="shade-block" style="background:${c}" onclick="navigator.clipboard.writeText('${c}')" title="${c}"></div>`).join('');
      document.getElementById('shadeLabels').innerHTML = shades.map(c=>`<span class="shade-label">${c.slice(1).toUpperCase()}</span>`).join('');
    }
    function syncFromPicker() { const v=document.getElementById('picker').value; document.getElementById('hexIn').value=v; render(); }
    function syncFromHex() { const v=document.getElementById('hexIn').value.trim(); if(/^#[0-9a-f]{6}$/i.test(v)){document.getElementById('picker').value=v; render();} }
    render();
  </script>
</body>
</html>
