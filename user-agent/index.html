<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Agent Parser — utils</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e10; --surface: #18181c; --border: #2a2a32;
      --accent: #b4ff6e; --accent-dim: #7ab844; --text: #e8e8ee;
      --muted: #6b6b7a; --danger: #ff6b6b; --good: #6effb4;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
    .back { align-self: flex-start; margin-bottom: 1.5rem; font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 0.4rem; transition: color 0.15s; }
    .back:hover { color: var(--accent); }
    .card { width: 100%; max-width: 680px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; box-shadow: 0 0 60px rgba(180,255,110,0.04); }
    .eyebrow { font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
    h1 { font-size: 1.6rem; font-weight: 500; color: var(--text); line-height: 1.2; margin-bottom: 2rem; }
    h1 span { color: var(--muted); }
    .ua-box { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; font-family: 'Space Mono', monospace; font-size: 0.75rem; color: var(--muted); word-break: break-all; line-height: 1.6; margin-bottom: 1.5rem; }
    .divider { height: 1px; background: var(--border); margin: 1.75rem 0; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .fact { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.25rem; }
    .fact-label { font-family: 'Space Mono', monospace; font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.35rem; }
    .fact-value { font-size: 0.95rem; color: var(--text); font-weight: 500; }
    .fact-value.accent { color: var(--accent); }
    .copy-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 0.82rem; padding: 0.45rem 1rem; border-radius: 6px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; margin-top: 0.75rem; }
    .copy-btn:hover { color: var(--text); border-color: var(--muted); }
    .copy-btn.copied { color: var(--good); border-color: var(--good); }
  </style>
</head>
<body>
  <a class="back" href="../">← utils</a>
  <div class="card">
    <header>
      <p class="eyebrow">Utility</p>
      <h1>User Agent Parser <span>/ what your browser reveals</span></h1>
    </header>
    <p class="eyebrow" style="margin-bottom:0.5rem">Your raw user agent string</p>
    <div class="ua-box" id="uaRaw"></div>
    <button class="copy-btn" id="copyBtn" onclick="copyUA()">Copy</button>
    <div class="divider"></div>
    <div class="grid" id="factsGrid"></div>
  </div>
  <script>
    const ua = navigator.userAgent;
    document.getElementById('uaRaw').textContent = ua;

    function copyUA() {
      navigator.clipboard.writeText(ua).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = 'Copied!'; btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    }

    function detect() {
      const u = ua;
      let browser = 'Unknown', browserVer = '', os = 'Unknown', osVer = '', device = 'Desktop', engine = 'Unknown';

      if (/Edg\//.test(u)) { browser = 'Edge'; browserVer = u.match(/Edg\/([\d.]+)/)?.[1] || ''; }
      else if (/OPR\//.test(u)) { browser = 'Opera'; browserVer = u.match(/OPR\/([\d.]+)/)?.[1] || ''; }
      else if (/Chrome\//.test(u) && !/Chromium/.test(u)) { browser = 'Chrome'; browserVer = u.match(/Chrome\/([\d.]+)/)?.[1] || ''; }
      else if (/Firefox\//.test(u)) { browser = 'Firefox'; browserVer = u.match(/Firefox\/([\d.]+)/)?.[1] || ''; }
      else if (/Safari\//.test(u) && !/Chrome/.test(u)) { browser = 'Safari'; browserVer = u.match(/Version\/([\d.]+)/)?.[1] || ''; }

      if (/Gecko\//.test(u)) engine = 'Gecko';
      else if (/AppleWebKit\//.test(u) && /like Gecko/.test(u)) engine = 'Blink';
      else if (/AppleWebKit\//.test(u)) engine = 'WebKit';

      if (/Windows NT ([\d.]+)/.test(u)) {
        os = 'Windows';
        const map = {'10.0':'10/11','6.3':'8.1','6.2':'8','6.1':'7'};
        osVer = map[u.match(/Windows NT ([\d.]+)/)?.[1]] || u.match(/Windows NT ([\d.]+)/)?.[1] || '';
      } else if (/Mac OS X ([\d_]+)/.test(u)) {
        os = 'macOS'; osVer = (u.match(/Mac OS X ([\d_]+)/)?.[1] || '').replace(/_/g,'.');
      } else if (/Android ([\d.]+)/.test(u)) {
        os = 'Android'; osVer = u.match(/Android ([\d.]+)/)?.[1] || ''; device = 'Mobile';
      } else if (/iPhone OS ([\d_]+)/.test(u)) {
        os = 'iOS'; osVer = (u.match(/iPhone OS ([\d_]+)/)?.[1] || '').replace(/_/g,'.'); device = 'Mobile';
      } else if (/iPad/.test(u)) {
        os = 'iPadOS'; device = 'Tablet';
      } else if (/Linux/.test(u)) {
        os = 'Linux';
      }

      if (/Mobi|Android|iPhone|iPad|Tablet/.test(u) && device === 'Desktop') device = 'Mobile';
      const lang = navigator.language || 'Unknown';
      const cores = navigator.hardwareConcurrency || 'Unknown';
      const mem = navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'Unknown';
      const touch = navigator.maxTouchPoints > 0 ? 'Yes (' + navigator.maxTouchPoints + ' points)' : 'No';

      return [
        { label: 'Browser', value: browser + (browserVer ? ' ' + browserVer.split('.')[0] : '') },
        { label: 'Engine', value: engine },
        { label: 'Operating System', value: os + (osVer ? ' ' + osVer : '') },
        { label: 'Device Type', value: device },
        { label: 'Language', value: lang },
        { label: 'CPU Cores', value: String(cores) },
        { label: 'Device Memory', value: mem },
        { label: 'Touch Screen', value: touch },
      ];
    }

    const facts = detect();
    const grid = document.getElementById('factsGrid');
    facts.forEach(f => {
      grid.innerHTML += `<div class="fact"><p class="fact-label">${f.label}</p><p class="fact-value accent">${f.value}</p></div>`;
    });
  </script>
</body>
</html>
