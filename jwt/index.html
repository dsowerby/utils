<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JWT Decoder — utils</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0e0e10; --surface: #18181c; --border: #2a2a32; --accent: #b4ff6e; --accent-dim: #7ab844; --text: #e8e8ee; --muted: #6b6b7a; --danger: #ff6b6b; --good: #6effb4; --json-key:#79c0ff; --json-str:#a5d6ff; --json-num:#ffa657; --json-bool:#ff7b72; --json-null:#8b949e; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
    .back { align-self: flex-start; margin-bottom: 1.5rem; font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 0.4rem; transition: color 0.15s; }
    .back:hover { color: var(--accent); }
    .card { width: 100%; max-width: 760px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; box-shadow: 0 0 60px rgba(180,255,110,0.04); }
    .eyebrow { font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
    h1 { font-size: 1.6rem; font-weight: 500; margin-bottom: 0.6rem; } h1 span { color: var(--muted); }
    .note { font-size: 0.82rem; color: var(--muted); margin-bottom: 1.75rem; }
    .label { font-family: 'Space Mono', monospace; font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
    textarea { width: 100%; min-height: 90px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.72rem; padding: 1rem; resize: vertical; outline: none; transition: border-color 0.2s; line-height: 1.6; margin-bottom: 0.75rem; }
    textarea:focus { border-color: var(--accent-dim); } textarea::placeholder { color: var(--muted); }
    .error { color: var(--danger); font-size: 0.78rem; font-family: 'Space Mono', monospace; min-height: 1.2em; margin-bottom: 0.75rem; }
    .divider { height: 1px; background: var(--border); margin: 1.25rem 0; }
    .section { margin-bottom: 1.25rem; }
    .section-head { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.6rem; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot-red { background: #ff7b72; } .dot-purple { background: #c678dd; } .dot-blue { background: #79c0ff; }
    .json-box { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; font-family: 'Space Mono', monospace; font-size: 0.78rem; line-height: 1.7; white-space: pre; overflow-x: auto; }
    .jk { color: var(--json-key); } .js { color: var(--json-str); } .jn { color: var(--json-num); } .jb { color: var(--json-bool); } .jz { color: var(--json-null); }
    .exp-badge { font-family: 'Space Mono', monospace; font-size: 0.68rem; padding: 0.25rem 0.6rem; border-radius: 4px; margin-left: auto; }
    .exp-ok { background: rgba(110,255,180,0.15); color: var(--good); }
    .exp-warn { background: rgba(255,107,107,0.15); color: var(--danger); }
    .sig-note { font-family: 'Space Mono', monospace; font-size: 0.72rem; color: var(--muted); background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 0.85rem 1rem; }
  </style>
  <link rel="apple-touch-icon" sizes="180x180" href="/utils/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/utils/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/utils/favicon-16x16.png">
  <link rel="manifest" href="/utils/site.webmanifest">
</head>
<body>
  <a class="back" href="../">← utils</a>
  <div class="card">
    <header><p class="eyebrow">Utility</p><h1>JWT Decoder <span>/ header &amp; payload</span></h1></header>
    <p class="note">Decoded entirely in your browser. Nothing is sent anywhere.</p>
    <p class="label">Token</p>
    <textarea id="input" placeholder="Paste a JWT here…" oninput="decode()"></textarea>
    <p class="error" id="err"></p>
    <div id="result" style="display:none">
      <div class="divider"></div>
      <div class="section">
        <div class="section-head"><span class="dot dot-red"></span><span class="label" style="margin:0">Header</span></div>
        <div class="json-box" id="headerBox"></div>
      </div>
      <div class="section">
        <div class="section-head"><span class="dot dot-purple"></span><span class="label" style="margin:0">Payload</span><span class="exp-badge" id="expBadge" style="display:none"></span></div>
        <div class="json-box" id="payloadBox"></div>
      </div>
      <div class="section">
        <div class="section-head"><span class="dot dot-blue"></span><span class="label" style="margin:0">Signature</span></div>
        <div class="sig-note">Signature verification requires the secret key and cannot be done in the browser without it. This tool only decodes — it does not verify.</div>
      </div>
    </div>
  </div>
  <script>
    function b64decode(str) {
      str = str.replace(/-/g,'+').replace(/_/g,'/');
      while (str.length%4) str+='=';
      return decodeURIComponent(atob(str).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));
    }
    function highlight(obj) {
      return JSON.stringify(obj,null,2).replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, m=>{
        if(/^"/.test(m)){ if(/:$/.test(m)) return `<span class="jk">${m}</span>`; return `<span class="js">${m}</span>`; }
        if(/true|false/.test(m)) return `<span class="jb">${m}</span>`;
        if(/null/.test(m)) return `<span class="jz">${m}</span>`;
        return `<span class="jn">${m}</span>`;
      });
    }
    function decode() {
      const raw = document.getElementById('input').value.trim();
      document.getElementById('err').textContent=''; document.getElementById('result').style.display='none';
      if (!raw) return;
      const parts = raw.split('.');
      if (parts.length !== 3) { document.getElementById('err').textContent='Invalid JWT: expected 3 parts separated by dots'; return; }
      try {
        const header = JSON.parse(b64decode(parts[0]));
        const payload = JSON.parse(b64decode(parts[1]));
        document.getElementById('headerBox').innerHTML = highlight(header);
        document.getElementById('payloadBox').innerHTML = highlight(payload);
        const badge = document.getElementById('expBadge');
        if (payload.exp) {
          const exp = new Date(payload.exp*1000);
          const expired = exp < new Date();
          badge.style.display='inline-block';
          badge.className='exp-badge '+(expired?'exp-warn':'exp-ok');
          badge.textContent=(expired?'Expired ':'Valid until ')+exp.toLocaleString();
        } else { badge.style.display='none'; }
        document.getElementById('result').style.display='block';
      } catch(e) { document.getElementById('err').textContent='Could not decode token: '+e.message; }
    }
  </script>
</body>
</html>
