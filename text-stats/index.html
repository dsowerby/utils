<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Text Statistics — utils</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/utils/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/utils/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/utils/favicon-16x16.png">
  <link rel="manifest" href="/utils/site.webmanifest">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0e0e10; --surface: #18181c; --border: #2a2a32; --accent: #b4ff6e; --accent-dim: #7ab844; --text: #e8e8ee; --muted: #6b6b7a; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
    .back { align-self: flex-start; margin-bottom: 1.5rem; font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 0.4rem; transition: color 0.15s; }
    .back:hover { color: var(--accent); }
    .card { width: 100%; max-width: 760px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; box-shadow: 0 0 60px rgba(180,255,110,0.04); }
    .eyebrow { font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
    h1 { font-size: 1.6rem; font-weight: 500; margin-bottom: 2rem; } h1 span { color: var(--muted); }
    textarea { width: 100%; min-height: 160px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; padding: 1rem; resize: vertical; outline: none; transition: border-color 0.2s; line-height: 1.7; margin-bottom: 1.5rem; }
    textarea:focus { border-color: var(--accent-dim); } textarea::placeholder { color: var(--muted); }
    .divider { height: 1px; background: var(--border); margin: 0 0 1.5rem; }
    .label { font-family: 'Space Mono', monospace; font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0.65rem; margin-bottom: 1.5rem; }
    .stat { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 0.9rem 1rem; }
    .stat-val { font-family: 'Space Mono', monospace; font-size: 1.25rem; color: var(--accent); font-weight: 700; margin-bottom: 0.2rem; }
    .stat-label { font-family: 'Space Mono', monospace; font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .readability { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 1.1rem; margin-bottom: 1.5rem; }
    .re-row { display: flex; justify-content: space-between; align-items: center; padding: 0.4rem 0; border-bottom: 1px solid var(--border); }
    .re-row:last-child { border-bottom: none; }
    .re-name { font-size: 0.85rem; color: var(--text); }
    .re-val { font-family: 'Space Mono', monospace; font-size: 0.85rem; color: var(--accent); }
    .freq-list { display: flex; flex-direction: column; gap: 0.4rem; }
    .freq-item { display: flex; align-items: center; gap: 0.75rem; }
    .freq-word { font-family: 'Space Mono', monospace; font-size: 0.8rem; color: var(--text); min-width: 100px; }
    .freq-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .freq-bar { height: 100%; background: var(--accent); border-radius: 3px; }
    .freq-count { font-family: 'Space Mono', monospace; font-size: 0.72rem; color: var(--muted); min-width: 30px; text-align: right; }
  </style>
</head>
<body>
  <a class="back" href="../">← utils</a>
  <div class="card">
    <header><p class="eyebrow">Utility</p><h1>Text Statistics <span>/ readability &amp; frequency</span></h1></header>
    <textarea id="input" placeholder="Paste text to analyse…" oninput="analyse()"></textarea>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="divider"></div>
    <p class="label">Readability scores</p>
    <div class="readability" id="readability"></div>
    <div class="divider"></div>
    <p class="label">Most frequent words</p>
    <div class="freq-list" id="freqList"></div>
  </div>
  <script>
    const STOPWORDS = new Set('the a an and or but in on at to for of with is are was were be been being have has had do does did will would could should may might shall can i you he she it we they me him her us them my your his its our their this that these those what which who whom when where why how all each every both many much more most other into through during before after above below between out off over under again then once here there when wherever'.split(' '));
    function syllables(word) {
      word = word.toLowerCase().replace(/[^a-z]/g,'');
      if (!word) return 0;
      word = word.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/, '').replace(/^y/, '');
      return (word.match(/[aeiouy]{1,2}/g)||[]).length || 1;
    }
    function analyse() {
      const text = document.getElementById('input').value;
      if (!text.trim()) { document.getElementById('statsGrid').innerHTML=''; document.getElementById('readability').innerHTML=''; document.getElementById('freqList').innerHTML=''; return; }
      const words = text.trim().split(/\s+/).filter(Boolean);
      const sentences = text.split(/[.!?]+/).filter(s=>s.trim()).length || 1;
      const chars = text.length;
      const charsNoSpace = text.replace(/\s/g,'').length;
      const paras = text.split(/\n\s*\n/).filter(p=>p.trim()).length || 1;
      const totalSyl = words.reduce((a,w)=>a+syllables(w),0);
      const avgSylPerWord = words.length ? totalSyl/words.length : 0;
      const avgWordsPerSent = words.length/sentences;
      const uniqueWords = new Set(words.map(w=>w.toLowerCase().replace(/[^a-z]/g,''))).size;

      document.getElementById('statsGrid').innerHTML = [
        {val:words.length,label:'Words'},
        {val:chars,label:'Characters'},
        {val:charsNoSpace,label:'No spaces'},
        {val:sentences,label:'Sentences'},
        {val:paras,label:'Paragraphs'},
        {val:uniqueWords,label:'Unique words'},
        {val:avgWordsPerSent.toFixed(1),label:'Words/sentence'},
        {val:avgSylPerWord.toFixed(1),label:'Syllables/word'},
      ].map(s=>`<div class="stat"><div class="stat-val">${s.val}</div><div class="stat-label">${s.label}</div></div>`).join('');

      // Flesch reading ease
      const fre = 206.835 - 1.015*avgWordsPerSent - 84.6*avgSylPerWord;
      const freClamped = Math.max(0,Math.min(100,fre)).toFixed(1);
      const freDesc = fre>=90?'Very Easy':fre>=80?'Easy':fre>=70?'Fairly Easy':fre>=60?'Standard':fre>=50?'Fairly Difficult':fre>=30?'Difficult':'Very Confusing';
      // Flesch-Kincaid grade
      const fkg = 0.39*avgWordsPerSent + 11.8*avgSylPerWord - 15.59;
      const fkgClamped = Math.max(0,fkg).toFixed(1);
      // Gunning Fog
      const complexWords = words.filter(w=>syllables(w)>=3).length;
      const fog = 0.4*(avgWordsPerSent + 100*complexWords/words.length);

      document.getElementById('readability').innerHTML = [
        {name:'Flesch Reading Ease', val:`${freClamped} — ${freDesc}`},
        {name:'Flesch-Kincaid Grade', val:`Grade ${fkgClamped}`},
        {name:'Gunning Fog Index', val:fog.toFixed(1)},
        {name:'Complex words (3+ syllables)', val:`${complexWords} (${(100*complexWords/words.length).toFixed(0)}%)`},
      ].map(r=>`<div class="re-row"><span class="re-name">${r.name}</span><span class="re-val">${r.val}</span></div>`).join('');

      // Word frequency
      const freq = {};
      words.forEach(w=>{ const k=w.toLowerCase().replace(/[^a-z']/g,''); if(k&&!STOPWORDS.has(k)&&k.length>1) freq[k]=(freq[k]||0)+1; });
      const sorted = Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,15);
      const max = sorted[0]?.[1]||1;
      document.getElementById('freqList').innerHTML = sorted.map(([w,c])=>`
        <div class="freq-item">
          <span class="freq-word">${w}</span>
          <div class="freq-bar-wrap"><div class="freq-bar" style="width:${(c/max*100).toFixed(0)}%"></div></div>
          <span class="freq-count">${c}</span>
        </div>`).join('');
    }
  </script>
</body>
</html>
