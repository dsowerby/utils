<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QR Code Generator — utils</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0e0e10; --surface: #18181c; --border: #2a2a32; --accent: #b4ff6e; --accent-dim: #7ab844; --text: #e8e8ee; --muted: #6b6b7a; --good: #6effb4; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
    .back { align-self: flex-start; margin-bottom: 1.5rem; font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 0.4rem; transition: color 0.15s; }
    .back:hover { color: var(--accent); }
    .card { width: 100%; max-width: 680px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; box-shadow: 0 0 60px rgba(180,255,110,0.04); }
    .eyebrow { font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
    h1 { font-size: 1.6rem; font-weight: 500; margin-bottom: 2rem; } h1 span { color: var(--muted); }
    textarea { width: 100%; min-height: 90px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.78rem; padding: 1rem; resize: vertical; outline: none; transition: border-color 0.2s; line-height: 1.6; margin-bottom: 0.75rem; }
    textarea:focus { border-color: var(--accent-dim); }
    textarea::placeholder { color: var(--muted); }
    .btn-row { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.75rem; }
    button { font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 0.9rem; border: none; border-radius: 8px; cursor: pointer; padding: 0.65rem 1.3rem; transition: all 0.15s; }
    .btn-primary { background: var(--accent); color: #0e0e10; } .btn-primary:hover { background: #c9ff8a; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); } .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
    .divider { height: 1px; background: var(--border); margin: 0 0 1.75rem; }
    .qr-wrap { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
    #qrCanvas { border-radius: 12px; display: none; }
    .label { font-family: 'Space Mono', monospace; font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
    .size-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
    input[type="range"] { -webkit-appearance: none; flex: 1; height: 4px; border-radius: 2px; background: var(--border); outline: none; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; }
  </style>
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png">
  <link rel="manifest" href="../site.webmanifest">
</head>
<body>
  <a class="back" href="../">← utils</a>
  <div class="card">
    <header><p class="eyebrow">Utility</p><h1>QR Code Generator <span>/ url or text</span></h1></header>
    <textarea id="input" placeholder="Paste a URL or any text…" oninput="debouncedGenerate()"></textarea>
    <p class="label" style="margin-bottom:0.5rem">Size: <span id="sizeVal">256</span>px</p>
    <div class="size-row"><input type="range" id="sizeSlider" min="128" max="512" step="32" value="256" oninput="document.getElementById('sizeVal').textContent=this.value; debouncedGenerate()"></div>
    <div class="btn-row">
      <button class="btn-ghost" id="dlBtn" onclick="download()" style="display:none">Download PNG</button>
    </div>
    <div class="divider"></div>
    <div class="qr-wrap"><canvas id="qrCanvas"></canvas></div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
  <script>
    let debounceTimer = null;
    function debouncedGenerate() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(generate, 300);
    }
    function generate() {
      const text = document.getElementById('input').value.trim();
      const canvas = document.getElementById('qrCanvas');
      if (!text) {
        canvas.style.display = 'none';
        document.getElementById('dlBtn').style.display = 'none';
        return;
      }
      const size = +document.getElementById('sizeSlider').value;
      const pad = 24;

      try {
        // qrcode-generator library
        const qr = qrcode(0, 'H');
        qr.addData(text);
        qr.make();

        const moduleCount = qr.getModuleCount();
        const moduleSize = Math.floor(size / moduleCount);
        const actualSize = moduleSize * moduleCount;

        canvas.width = actualSize + pad * 2;
        canvas.height = actualSize + pad * 2;
        const ctx = canvas.getContext('2d');

        // White background including quiet zone
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw modules
        for (let row = 0; row < moduleCount; row++) {
          for (let col = 0; col < moduleCount; col++) {
            ctx.fillStyle = qr.isDark(row, col) ? '#000000' : '#ffffff';
            ctx.fillRect(pad + col * moduleSize, pad + row * moduleSize, moduleSize, moduleSize);
          }
        }

        canvas.style.display = 'block';
        document.getElementById('dlBtn').style.display = 'inline-block';
      } catch(e) {
        console.error('QR generation failed:', e);
      }
    }
    function download() {
      const canvas = document.getElementById('qrCanvas');
      const a = document.createElement('a');
      a.download = 'qrcode.png'; a.href = canvas.toDataURL(); a.click();
    }
  </script>
</body>
</html>
