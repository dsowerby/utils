<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CSS Gradient Builder — utils</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/utils/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/utils/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/utils/favicon-16x16.png">
  <link rel="manifest" href="/utils/site.webmanifest">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0e0e10; --surface: #18181c; --border: #2a2a32; --accent: #b4ff6e; --accent-dim: #7ab844; --text: #e8e8ee; --muted: #6b6b7a; --danger: #ff6b6b; --good: #6effb4; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
    .back { align-self: flex-start; margin-bottom: 1.5rem; font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 0.4rem; transition: color 0.15s; }
    .back:hover { color: var(--accent); }
    .card { width: 100%; max-width: 680px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; box-shadow: 0 0 60px rgba(180,255,110,0.04); }
    .eyebrow { font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
    h1 { font-size: 1.6rem; font-weight: 500; margin-bottom: 2rem; } h1 span { color: var(--muted); }
    .preview { width: 100%; height: 140px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 1.5rem; transition: background 0.2s; }
    .label { font-family: 'Space Mono', monospace; font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
    .type-tabs { display: flex; gap: 0.4rem; margin-bottom: 1.25rem; }
    .ttab { font-family: 'Space Mono', monospace; font-size: 0.65rem; padding: 0.35rem 0.85rem; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; }
    .ttab.active { background: var(--accent); color: #0e0e10; border-color: var(--accent); }
    .stops { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1rem; }
    .stop-row { display: flex; align-items: center; gap: 0.6rem; }
    input[type="color"] { width: 44px; height: 36px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); padding: 2px; cursor: pointer; flex-shrink: 0; }
    .stop-hex { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.8rem; padding: 0.5rem 0.7rem; outline: none; width: 90px; transition: border-color 0.2s; }
    .stop-hex:focus { border-color: var(--accent-dim); }
    .stop-pos { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.8rem; padding: 0.5rem 0.7rem; outline: none; width: 70px; transition: border-color 0.2s; }
    .stop-pos:focus { border-color: var(--accent-dim); }
    .pos-label { font-family: 'Space Mono', monospace; font-size: 0.75rem; color: var(--muted); }
    .rm-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 5px; cursor: pointer; padding: 0.3rem 0.55rem; font-size: 0.75rem; transition: all 0.15s; }
    .rm-btn:hover { color: var(--danger); border-color: var(--danger); }
    .add-btn { background: transparent; border: 1px dashed var(--border); color: var(--muted); font-size: 0.8rem; padding: 0.45rem 1rem; border-radius: 6px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; margin-bottom: 1.25rem; }
    .add-btn:hover { color: var(--text); border-color: var(--muted); }
    .angle-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem; }
    input[type="range"] { -webkit-appearance: none; flex: 1; height: 4px; border-radius: 2px; background: var(--border); outline: none; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; }
    .divider { height: 1px; background: var(--border); margin: 0 0 1.25rem; }
    .css-box { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; font-family: 'Space Mono', monospace; font-size: 0.78rem; color: var(--accent); word-break: break-all; line-height: 1.6; margin-bottom: 0.75rem; }
    .copy-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 0.82rem; padding: 0.45rem 1rem; border-radius: 6px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
    .copy-btn:hover { color: var(--text); border-color: var(--muted); }
    .copy-btn.copied { color: var(--good); border-color: var(--good); }
  
    /* Maximise */
    .maximise-btn {
      position: absolute;
      top: 1.25rem;
      right: 1.25rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 7px;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.15s;
      flex-shrink: 0;
      z-index: 10;
    }
    .maximise-btn:hover { color: var(--accent); border-color: var(--accent-dim); }

    .card { position: relative; }

    .card.maximised {
      position: fixed;
      inset: 0;
      max-width: 100%;
      width: 100%;
      height: 100%;
      border-radius: 0;
      border: none;
      overflow-y: auto;
      z-index: 1000;
      margin: 0;
      padding: 2rem 2.5rem;
    }

    body.maximised-body {
      overflow: hidden;
    }
  </style>
</head>
<body>
  <a class="back" href="../">← utils</a>
  <div class="card">
      <button class="maximise-btn" onclick="toggleMaximise()" id="maxBtn" title="Maximise">⛶</button>
    <header><p class="eyebrow">Utility</p><h1>CSS Gradient <span>/ visual builder</span></h1></header>
    <div class="preview" id="preview"></div>
    <div class="type-tabs">
      <button class="ttab active" data-t="linear" onclick="setType(this)">Linear</button>
      <button class="ttab" data-t="radial" onclick="setType(this)">Radial</button>
      <button class="ttab" data-t="conic" onclick="setType(this)">Conic</button>
    </div>
    <div id="angleWrap">
      <p class="label">Angle: <span id="angleVal">135</span>°</p>
      <div class="angle-row"><input type="range" id="angleSlider" min="0" max="360" value="135" oninput="document.getElementById('angleVal').textContent=this.value; render()"></div>
    </div>
    <p class="label" style="margin:1rem 0 0.5rem">Colour stops</p>
    <div class="stops" id="stops"></div>
    <button class="add-btn" onclick="addStop()">+ Add stop</button>
    <div class="divider"></div>
    <p class="label" style="margin-bottom:0.5rem">CSS output</p>
    <div class="css-box" id="cssOut"></div>
    <button class="copy-btn" id="copyBtn" onclick="copyCss()">Copy</button>
  </div>
  <script>
    let gradType = 'linear';
    let stops = [{ color: '#b4ff6e', pos: 0 }, { color: '#0e7bff', pos: 100 }];
    function setType(btn) { document.querySelectorAll('.ttab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); gradType=btn.dataset.t; document.getElementById('angleWrap').style.display=gradType==='radial'?'none':'block'; render(); }
    function addStop() { stops.push({ color: '#ffffff', pos: 50 }); renderStops(); render(); }
    function removeStop(i) { if(stops.length<=2) return; stops.splice(i,1); renderStops(); render(); }
    function renderStops() {
      document.getElementById('stops').innerHTML = stops.map((s,i) => `
        <div class="stop-row">
          <input type="color" value="${s.color}" oninput="stops[${i}].color=this.value; document.getElementById('sh${i}').value=this.value; render()">
          <input type="text" class="stop-hex" id="sh${i}" value="${s.color}" oninput="if(/^#[0-9a-f]{6}$/i.test(this.value)){stops[${i}].color=this.value;render();}">
          <input type="number" class="stop-pos" value="${s.pos}" min="0" max="100" oninput="stops[${i}].pos=+this.value;render()">
          <span class="pos-label">%</span>
          <button class="rm-btn" onclick="removeStop(${i})">✕</button>
        </div>`).join('');
    }
    function buildCss() {
      const sorted = [...stops].sort((a,b)=>a.pos-b.pos);
      const stopsStr = sorted.map(s=>`${s.color} ${s.pos}%`).join(', ');
      const angle = document.getElementById('angleSlider').value;
      if (gradType==='linear') return `linear-gradient(${angle}deg, ${stopsStr})`;
      if (gradType==='radial') return `radial-gradient(circle, ${stopsStr})`;
      return `conic-gradient(from ${angle}deg, ${stopsStr})`;
    }
    function render() {
      const css = buildCss();
      document.getElementById('preview').style.background = css;
      document.getElementById('cssOut').textContent = `background: ${css};`;
    }
    function copyCss() {
      const t = `background: ${buildCss()};`;
      navigator.clipboard.writeText(t).then(() => { const b=document.getElementById('copyBtn'); b.textContent='Copied!'; b.classList.add('copied'); setTimeout(()=>{b.textContent='Copy';b.classList.remove('copied');},2000); });
    }
    renderStops(); render();
  
  function toggleMaximise() {
    const card = document.querySelector('.card');
    const btn = document.getElementById('maxBtn');
    const isMax = card.classList.toggle('maximised');
    document.body.classList.toggle('maximised-body', isMax);
    btn.textContent = isMax ? '✕' : '⛶';
    btn.title = isMax ? 'Restore' : 'Maximise';
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      const card = document.querySelector('.card');
      if (card.classList.contains('maximised')) toggleMaximise();
    }
  });
</script>
</body>
</html>
